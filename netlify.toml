[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[dev]
  command = "npm run dev"
  targetPort = 8080
  port = 8888
  publish = "dist"
  autoLaunch = false

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"
  included_files = ["drizzle/**", "src/db/**", "src/server/**"]

# TanStack Start netlify preset writes its server entry into .netlify/functions-internal.
# The preset registers redirects automatically; the SPA fallback below covers any
# unmatched paths in case the preset is replaced with a plain SPA build.

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = false

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
