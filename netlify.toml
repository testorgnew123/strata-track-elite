[build]
  command = "npm run build"
  publish = "dist/client"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[dev]
  command = "npm run dev"
  targetPort = 8080
  port = 8888
  publish = "dist/client"
  autoLaunch = false

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"
  included_files = ["drizzle/**", "src/db/**", "src/server/**"]

# Edge function /api/upload-document self-registers via inline
# `export const config = { path: ... }` — bypasses the ~6 MB sync function
# body cap so documents up to 50 MB can be uploaded. Edge functions are
# matched before redirects, so the /api/* fallback below does not interfere.

# /api/* falls through to the Netlify v2 functions in netlify/functions/
# which self-register their paths via `export const config = { path: ... }`.
# Defensive fallback; force=false so it does not override TanStack Start's
# SSR catch-all registered by @netlify/vite-plugin-tanstack-start.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = false
